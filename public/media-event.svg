<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0a1b2f"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <radialGradient id="spot" cx="55%" cy="35%" r="55%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot2" cx="30%" cy="70%" r="60%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1600" height="900" fill="url(#g1)"/>
  <rect width="1600" height="900" fill="url(#spot)"/>
  <rect width="1600" height="900" fill="url(#spot2)"/>

  <!-- Bokeh / lights -->
  <g filter="url(#soft)" opacity="0.9">
    <circle cx="1240" cy="220" r="90" fill="#38bdf8" opacity="0.22"/>
    <circle cx="1320" cy="300" r="55" fill="#22c55e" opacity="0.14"/>
    <circle cx="1120" cy="310" r="42" fill="#a78bfa" opacity="0.16"/>
    <circle cx="980" cy="180" r="35" fill="#f59e0b" opacity="0.12"/>
    <circle cx="360" cy="230" r="70" fill="#38bdf8" opacity="0.14"/>
    <circle cx="420" cy="320" r="45" fill="#a78bfa" opacity="0.14"/>
    <circle cx="260" cy="360" r="32" fill="#f472b6" opacity="0.10"/>
  </g>

  <!-- Stage silhouettes -->
  <g opacity="0.55">
    <path d="M0 720 C220 650, 520 670, 760 720 C980 768, 1260 790, 1600 740 L1600 900 L0 900 Z" fill="#03050a"/>
    <path d="M0 750 C240 720, 560 720, 820 770 C1040 812, 1320 830, 1600 800 L1600 900 L0 900 Z" fill="#02040a" opacity="0.9"/>
  </g>

  <!-- Light beams -->
  <g opacity="0.22">
    <path d="M1080 0 L1200 0 L980 900 L860 900 Z" fill="#38bdf8"/>
    <path d="M980 0 L1040 0 L820 900 L760 900 Z" fill="#a78bfa"/>
    <path d="M1240 0 L1310 0 L1110 900 L1040 900 Z" fill="#22c55e" opacity="0.7"/>
  </g>
</svg>
